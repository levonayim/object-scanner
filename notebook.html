<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scribble — daily notebook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EFEAE0;
    --paper-tab: #F7F3E9;
    --ink: #26241F;
    --ink-soft: #6B675C;
    --moss: #4B6156;
    --moss-dark: #384A41;
    --clay: #B85C38;
    --sky: #4A7C9E;
    --line: rgba(38,36,31,0.12);
    --shadow: rgba(38,36,31,0.15);
  }
  *{box-sizing:border-box;}
  body{margin:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter',sans-serif;
    color:var(--ink);
    background:var(--paper);
    display:flex;
    height:100vh;
    overflow:hidden;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:220px;
    flex-shrink:0;
    background:var(--moss-dark);
    color:#EFEAE0;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .rings{
    display:flex;
    justify-content:space-around;
    padding:14px 10px 6px;
  }
  .rings span{
    width:10px;height:10px;border-radius:50%;
    background:var(--moss-dark);
    border:2px solid #EFEAE0;
    opacity:0.35;
  }
  .brand{
    font-family:'Fraunces',serif;
    font-size:22px;
    font-weight:600;
    padding:2px 18px 14px;
    letter-spacing:0.2px;
  }
  .brand small{
    display:block;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    font-weight:400;
    letter-spacing:1px;
    text-transform:uppercase;
    opacity:0.55;
    margin-top:2px;
  }
  .day-list{
    flex:1;
    overflow-y:auto;
    padding:4px 0 10px;
  }
  .day-item{
    display:flex;
    align-items:center;
    gap:8px;
    margin:3px 0 3px 10px;
    padding:9px 12px;
    background:var(--paper-tab);
    color:var(--ink);
    border-radius:8px 0 0 8px;
    cursor:pointer;
    font-family:'JetBrains Mono',monospace;
    font-size:12.5px;
    position:relative;
    transition:transform .12s ease, background .12s ease;
    border:1px solid transparent;
  }
  .day-item:hover{ transform:translateX(-3px); }
  .day-item.active{
    background:#FFFDF7;
    font-weight:600;
    transform:translateX(-5px);
    box-shadow:-2px 2px 6px var(--shadow);
  }
  .day-item .dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
  }
  .day-item .label{ flex:1; }
  .day-item .today-badge{
    font-size:9px;
    background:var(--clay);
    color:#fff;
    padding:1px 5px;
    border-radius:4px;
    letter-spacing:0.5px;
  }
  .day-item .del{
    opacity:0;
    font-size:14px;
    color:var(--ink-soft);
    padding:0 2px;
  }
  .day-item:hover .del{ opacity:0.6; }
  .day-item .del:hover{ opacity:1; color:var(--clay); }

  .add-day{
    margin:8px 14px 14px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .add-day button{
    background:var(--clay);
    color:#fff;
    border:none;
    border-radius:7px;
    padding:9px 10px;
    font-family:'Inter',sans-serif;
    font-size:12.5px;
    font-weight:600;
    cursor:pointer;
    letter-spacing:0.2px;
  }
  .add-day button:hover{ filter:brightness(1.08); }
  .add-day .today-btn{
    background:transparent;
    border:1px solid rgba(239,234,224,0.35);
    color:#EFEAE0;
  }

  /* ---------- Main ---------- */
  .main{
    flex:1;
    display:flex;
    flex-direction:column;
    min-width:0;
  }
  .topbar{
    display:flex;
    align-items:flex-end;
    gap:2px;
    padding:16px 18px 0;
    border-bottom:1px solid var(--line);
    background:var(--paper);
  }
  .day-title{
    font-family:'Fraunces',serif;
    font-size:19px;
    font-weight:600;
    margin:0 16px 10px 2px;
    white-space:nowrap;
  }
  .tabs{
    display:flex;
    align-items:flex-end;
    gap:4px;
    flex:1;
    overflow-x:auto;
  }
  .tab{
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 12px;
    background:var(--paper-tab);
    border:1px solid var(--line);
    border-bottom:none;
    border-radius:8px 8px 0 0;
    font-size:13px;
    cursor:pointer;
    color:var(--ink-soft);
    white-space:nowrap;
  }
  .tab.active{
    background:#FFFDF7;
    color:var(--ink);
    font-weight:600;
    box-shadow:0 -2px 6px var(--shadow);
  }
  .tab .x{
    opacity:0;
    font-size:12px;
    padding:0 2px;
  }
  .tab:hover .x{ opacity:0.5; }
  .tab .x:hover{ opacity:1; color:var(--clay); }
  .add-tab{
    padding:8px 12px;
    color:var(--ink-soft);
    cursor:pointer;
    font-size:16px;
    line-height:1;
    margin-bottom:2px;
  }
  .add-tab:hover{ color:var(--clay); }

  .toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 18px;
    background:#FFFDF7;
    border-bottom:1px solid var(--line);
  }
  .mode-switch{
    display:flex;
    background:var(--paper);
    border-radius:8px;
    padding:3px;
    gap:2px;
  }
  .mode-switch button{
    border:none;
    background:transparent;
    padding:6px 14px;
    font-size:12.5px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    border-radius:6px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .mode-switch button.active{
    background:var(--moss);
    color:#fff;
  }
  .toolbar .spacer{ flex:1; }
  .draw-tools{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .draw-tools input[type=color]{
    width:26px;height:26px;
    border:none;
    border-radius:50%;
    overflow:hidden;
    padding:0;
    cursor:pointer;
    background:none;
  }
  .draw-tools input[type=range]{ width:80px; }
  .draw-tools .clear-btn{
    background:transparent;
    border:1px solid var(--line);
    border-radius:6px;
    padding:6px 10px;
    font-size:12px;
    cursor:pointer;
    color:var(--ink-soft);
  }
  .draw-tools .clear-btn:hover{ color:var(--clay); border-color:var(--clay); }
  .save-indicator{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;
    color:var(--ink-soft);
    opacity:0.7;
    letter-spacing:0.3px;
  }

  .content{
    flex:1;
    position:relative;
    background:#FFFDF7;
    background-image:radial-gradient(var(--line) 1px, transparent 1px);
    background-size:22px 22px;
    overflow:hidden;
  }
  textarea{
    width:100%;height:100%;
    border:none;
    resize:none;
    background:transparent;
    padding:24px;
    font-family:'Fraunces', serif;
    font-size:17px;
    line-height:1.7;
    color:var(--ink);
    outline:none;
  }
  textarea::placeholder{ color:var(--ink-soft); opacity:0.6; }
  canvas{
    width:100%;
    height:100%;
    display:block;
    cursor:crosshair;
    touch-action:none;
  }
  .empty-state{
    display:flex;
    align-items:center;
    justify-content:center;
    height:100%;
    flex-direction:column;
    gap:10px;
    color:var(--ink-soft);
    font-family:'Fraunces',serif;
    font-size:18px;
    text-align:center;
    padding:20px;
  }
  .empty-state button{
    background:var(--moss);
    color:#fff;
    border:none;
    border-radius:7px;
    padding:9px 16px;
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:13px;
    cursor:pointer;
  }
</style>
</head>
<body>

<div class="sidebar">
  <div class="rings">
    <span></span><span></span><span></span><span></span><span></span>
  </div>
  <div class="brand">Scribble<small>daily notebook</small></div>
  <div class="day-list" id="dayList"></div>
  <div class="add-day">
    <button class="today-btn" id="jumpToday">Jump to today</button>
    <button id="addDayBtn">+ New day</button>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="day-title" id="dayTitle"></div>
    <div class="tabs" id="tabsRow"></div>
    <div class="add-tab" id="addTabBtn" title="Add tab">+</div>
  </div>
  <div class="toolbar" id="toolbar">
    <div class="mode-switch">
      <button id="modeType">Type</button>
      <button id="modeDraw">Draw</button>
    </div>
    <div class="spacer"></div>
    <div class="draw-tools" id="drawTools" style="display:none;">
      <input type="color" id="penColor" value="#26241F">
      <input type="range" id="penSize" min="1" max="20" value="3">
      <button class="clear-btn" id="clearCanvas">Clear</button>
    </div>
    <div class="save-indicator" id="saveIndicator">saved</div>
  </div>
  <div class="content" id="contentArea"></div>
</div>

<script>
(function(){
  const ACCENTS = ['#B85C38', '#4A7C9E', '#4B6156', '#8E6C9C'];

  let notebook = { days: {}, dayOrder: [], activeDay: null };
  let saveTimer = null;
  let drawing = false;
  let lastX = 0, lastY = 0;

  const dayList = document.getElementById('dayList');
  const dayTitle = document.getElementById('dayTitle');
  const tabsRow = document.getElementById('tabsRow');
  const contentArea = document.getElementById('contentArea');
  const drawTools = document.getElementById('drawTools');
  const modeTypeBtn = document.getElementById('modeType');
  const modeDrawBtn = document.getElementById('modeDraw');
  const saveIndicator = document.getElementById('saveIndicator');

  function todayKey(){
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function formatDay(key){
    const [y,m,d] = key.split('-').map(Number);
    const date = new Date(y, m-1, d);
    return date.toLocaleDateString(undefined, { weekday:'short', month:'short', day:'numeric' });
  }
  function newTab(name){
    return { id:'t'+Date.now()+Math.random().toString(16).slice(2), name: name || 'Tab', mode:'type', text:'', drawing:null };
  }
  function ensureDay(key){
    if(!notebook.days[key]){
      const tab = newTab('Tab 1');
      notebook.days[key] = { tabs:[tab], activeTab: tab.id };
      notebook.dayOrder.push(key);
      notebook.dayOrder.sort().reverse();
    }
    return notebook.days[key];
  }

  async function load(){
    try{
      const res = await window.storage.get('notebook-data', false);
      if(res && res.value){ notebook = JSON.parse(res.value); }
    }catch(e){ /* nothing saved yet */ }
    if(notebook.dayOrder.length === 0){ ensureDay(todayKey()); }
    if(!notebook.activeDay || !notebook.days[notebook.activeDay]){
      notebook.activeDay = notebook.dayOrder[0];
    }
    renderAll();
  }

  function scheduleSave(){
    saveIndicator.textContent = 'saving…';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{
      try{
        await window.storage.set('notebook-data', JSON.stringify(notebook), false);
        saveIndicator.textContent = 'saved';
      }catch(e){
        saveIndicator.textContent = 'save failed';
      }
    }, 500);
  }

  function renderAll(){
    renderDayList();
    renderDayHeader();
  }

  function renderDayList(){
    dayList.innerHTML = '';
    notebook.dayOrder.forEach((key, i)=>{
      const item = document.createElement('div');
      item.className = 'day-item' + (key === notebook.activeDay ? ' active' : '');
      const isToday = key === todayKey();
      item.innerHTML = `
        <span class="dot" style="background:${ACCENTS[i % ACCENTS.length]}"></span>
        <span class="label">${formatDay(key)}</span>
        ${isToday ? '<span class="today-badge">today</span>' : ''}
        <span class="del" data-key="${key}">×</span>
      `;
      item.addEventListener('click', (e)=>{
        if(e.target.classList.contains('del')) return;
        notebook.activeDay = key;
        renderAll();
      });
      item.querySelector('.del').addEventListener('click', (e)=>{
        e.stopPropagation();
        if(notebook.dayOrder.length === 1){ alert("You need at least one day."); return; }
        if(!confirm(`Delete ${formatDay(key)} and everything in it?`)) return;
        delete notebook.days[key];
        notebook.dayOrder = notebook.dayOrder.filter(k => k !== key);
        if(notebook.activeDay === key){ notebook.activeDay = notebook.dayOrder[0]; }
        scheduleSave();
        renderAll();
      });
      dayList.appendChild(item);
    });
  }

  function renderDayHeader(){
    const key = notebook.activeDay;
    const day = notebook.days[key];
    dayTitle.textContent = formatDay(key);
    tabsRow.innerHTML = '';
    day.tabs.forEach(tab=>{
      const el = document.createElement('div');
      el.className = 'tab' + (tab.id === day.activeTab ? ' active' : '');
      el.innerHTML = `<span class="name">${escapeHtml(tab.name)}</span><span class="x" data-id="${tab.id}">×</span>`;
      el.addEventListener('click', (e)=>{
        if(e.target.classList.contains('x')) return;
        day.activeTab = tab.id;
        renderDayHeader();
        renderContent();
      });
      el.querySelector('.name').addEventListener('dblclick', ()=>{
        const newName = prompt('Rename tab', tab.name);
        if(newName && newName.trim()){ tab.name = newName.trim(); scheduleSave(); renderDayHeader(); }
      });
      el.querySelector('.x').addEventListener('click', (e)=>{
        e.stopPropagation();
        if(day.tabs.length === 1){ alert("Each day needs at least one tab."); return; }
        if(!confirm(`Delete tab "${tab.name}"?`)) return;
        day.tabs = day.tabs.filter(t => t.id !== tab.id);
        if(day.activeTab === tab.id){ day.activeTab = day.tabs[0].id; }
        scheduleSave();
        renderDayHeader();
        renderContent();
      });
      tabsRow.appendChild(el);
    });
    renderContent();
  }

  function escapeHtml(s){
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function currentTab(){
    const day = notebook.days[notebook.activeDay];
    return day.tabs.find(t => t.id === day.activeTab);
  }

  function renderContent(){
    const tab = currentTab();
    drawTools.style.display = tab.mode === 'draw' ? 'flex' : 'none';
    modeTypeBtn.classList.toggle('active', tab.mode === 'type');
    modeDrawBtn.classList.toggle('active', tab.mode === 'draw');

    contentArea.innerHTML = '';
    if(tab.mode === 'type'){
      const ta = document.createElement('textarea');
      ta.placeholder = 'Start typing your ideas…';
      ta.value = tab.text || '';
      ta.addEventListener('input', ()=>{
        tab.text = ta.value;
        scheduleSave();
      });
      contentArea.appendChild(ta);
      ta.focus();
    } else {
      const canvas = document.createElement('canvas');
      contentArea.appendChild(canvas);
      setupCanvas(canvas, tab);
    }
  }

  function setupCanvas(canvas, tab){
    const dpr = window.devicePixelRatio || 1;
    function resize(){
      const rect = canvas.getBoundingClientRect();
      const img = tab.drawing;
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      if(img){
        const image = new Image();
        image.onload = ()=> ctx.drawImage(image, 0, 0, rect.width, rect.height);
        image.src = img;
      }
    }
    resize();
    window.addEventListener('resize', resize, { once:false });

    const ctx = canvas.getContext('2d');
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    function pos(e){
      const rect = canvas.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function start(e){
      drawing = true;
      const p = pos(e);
      lastX = p.x; lastY = p.y;
    }
    function move(e){
      if(!drawing) return;
      e.preventDefault();
      const p = pos(e);
      ctx.strokeStyle = document.getElementById('penColor').value;
      ctx.lineWidth = document.getElementById('penSize').value;
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(p.x, p.y);
      ctx.stroke();
      lastX = p.x; lastY = p.y;
    }
    function end(){
      if(!drawing) return;
      drawing = false;
      tab.drawing = canvas.toDataURL('image/png');
      scheduleSave();
    }
    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start);
    canvas.addEventListener('touchmove', move);
    canvas.addEventListener('touchend', end);

    document.getElementById('clearCanvas').onclick = ()=>{
      const rect = canvas.getBoundingClientRect();
      ctx.clearRect(0, 0, rect.width, rect.height);
      tab.drawing = null;
      scheduleSave();
    };
  }

  modeTypeBtn.addEventListener('click', ()=>{
    currentTab().mode = 'type';
    scheduleSave();
    renderContent();
  });
  modeDrawBtn.addEventListener('click', ()=>{
    currentTab().mode = 'draw';
    scheduleSave();
    renderContent();
  });

  document.getElementById('addTabBtn').addEventListener('click', ()=>{
    const day = notebook.days[notebook.activeDay];
    const tab = newTab('Tab ' + (day.tabs.length + 1));
    day.tabs.push(tab);
    day.activeTab = tab.id;
    scheduleSave();
    renderDayHeader();
  });

  document.getElementById('addDayBtn').addEventListener('click', ()=>{
    const input = prompt('Add a day (YYYY-MM-DD), or leave blank for today:');
    let key = todayKey();
    if(input && input.trim()){
      const d = new Date(input.trim());
      if(isNaN(d.getTime())){ alert('Could not understand that date.'); return; }
      key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }
    ensureDay(key);
    notebook.activeDay = key;
    scheduleSave();
    renderAll();
  });

  document.getElementById('jumpToday').addEventListener('click', ()=>{
    const key = todayKey();
    ensureDay(key);
    notebook.activeDay = key;
    scheduleSave();
    renderAll();
  });

  load();
})();
</script>
</body>
</html>
